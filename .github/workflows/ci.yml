name: tests

on:
  push:
    branches: [main, "tradingHouse/stage-2"]
  pull_request:
    branches: [main, "tradingHouse/stage-2"]

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # MetaTrader5 — Windows-only; на Linux pip его пропустит по маркеру
      # sys_platform в requirements.txt, и тесты подхватят стаб из
      # tests/conftest.py. TA-Lib 0.6.x ставится из manylinux-wheel.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest -q
