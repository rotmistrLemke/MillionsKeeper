<!--
  MillionsKeeper · Full Logo (mark + wordmark)
  Используется в шапке. Высота 28px, ширина авто.
  Wordmark: "Millions" Inter SemiBold + "Keeper" Inter Bold с золотым акцентом.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 32" width="220" height="32" role="img" aria-label="MillionsKeeper">
  <defs>
    <linearGradient id="mkfGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFD158"/>
      <stop offset="55%" stop-color="#F7A600"/>
      <stop offset="100%" stop-color="#D98B00"/>
    </linearGradient>
    <filter id="mkfGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- ═══ MARK 32×32 ═══ -->
  <g transform="translate(0,0)">
    <path
      fill="url(#mkfGold)"
      d="M6 1 H23 a3 3 0 0 1 3 3 v2.5 a2 2 0 0 0 2 2 a3 3 0 0 1 3 3 V26
         a3 3 0 0 1 -3 3 H6 a5 5 0 0 1 -5 -5 V6 a5 5 0 0 1 5 -5 Z"
    />
    <g fill="#0B0E11">
      <rect x="6"  y="20" width="3.5" height="6"  rx="1"/>
      <rect x="11" y="16" width="3.5" height="10" rx="1"/>
      <rect x="16" y="11" width="3.5" height="15" rx="1"/>
      <rect x="21" y="7"  width="3.5" height="19" rx="1"/>
    </g>
    <path d="M7.5 18 L12.5 14 L17.5 9 L22.5 5"
      fill="none" stroke="#0B0E11" stroke-width="1.2"
      stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <circle cx="22.5" cy="5" r="1.6" fill="#0B0E11"/>
    <circle cx="22.5" cy="5" r="0.9" fill="#FFD158" filter="url(#mkfGlow)"/>
  </g>

  <!-- ═══ WORDMARK ═══ -->
  <g font-family="Inter, system-ui, sans-serif" font-size="17" letter-spacing="-0.3">
    <text x="42" y="22" fill="#EAECEF" font-weight="500">Millions</text>
    <text x="119" y="22" fill="url(#mkfGold)" font-weight="700">Keeper</text>
  </g>

  <!-- Tagline -->
  <text x="42" y="30" font-family="Inter, system-ui, sans-serif"
        font-size="7" letter-spacing="2" fill="#5E6673" font-weight="600">
    ALGO TRADING · MT5
  </text>
</svg>
