version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mk
      POSTGRES_PASSWORD: mk
      POSTGRES_DB: millionskeeper
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mk -d millionskeeper"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # NOTE: backend не запускается в Docker на Windows из-за MT5 зависимости.
  # MT5 Python API работает только нативно на Windows.
  # Docker используется только для PostgreSQL + Redis в dev режиме.

volumes:
  postgres_data:
  redis_data:
