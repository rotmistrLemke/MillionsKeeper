version: "3.9"

# Dev-окружение: PostgreSQL + Redis + pgAdmin
# Запуск: docker compose -f docker/docker-compose.dev.yml up -d
# pgAdmin: http://localhost:5050  (admin@mk.local / mk)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mk
      POSTGRES_PASSWORD: mk
      POSTGRES_DB: millionskeeper
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mk -d millionskeeper"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mk.local
      PGADMIN_DEFAULT_PASSWORD: mk
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_dev_data:
  redis_dev_data:
  pgadmin_data:
