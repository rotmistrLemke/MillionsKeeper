[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (no external deps)
    integration: Integration tests (require running DB/Redis)
    slow: Slow tests (backtest with many bars)
